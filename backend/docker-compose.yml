services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vid2doc
      POSTGRES_USER: vid2doc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vid2doc -d vid2doc"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build: .
    image: vid2doc-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    image: vid2doc-backend
    command: ["python", "worker.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    image: vid2doc-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
