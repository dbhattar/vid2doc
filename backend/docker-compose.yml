services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vid2doc
      POSTGRES_USER: vid2doc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    image: vid2doc-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build: .
    image: vid2doc-backend
    command: ["python", "worker.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - postgres
    restart: unless-stopped
