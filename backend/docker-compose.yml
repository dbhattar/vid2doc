services:
  api:
    build: .
    image: vid2doc-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped

  worker:
    build: .
    image: vid2doc-backend
    command: ["python", "worker.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped
